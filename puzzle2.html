<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The New Deal Files | Puzzle 2</title>
  <link rel="stylesheet" href="puzzle2.css" />
</head>
<body>
  <div class="overlay"></div>

  <main class="main-frame">
    <section class="welcome-card">
      <div class="card-header">
        <span class="status-indicator">● ENCRYPTED CONNECTION</span>
        <span class="date-stamp">FHA FILE</span>
      </div>

      <div class="card-body">
        <h1 class="main-title">PUZZLE 2</h1>

        <div class="briefing-box">
          <h2 class="section-label">// LETTER RECONSTRUCTION</h2>
          <p>Tap the letters in the correct order to reveal the hidden term.</p>
        </div>

        <div class="hint-box">
          <h2 class="section-label">// HINT</h2>
          <p>a government agency related to housing</p>
        </div>

        <div id="lettersContainer" class="letters-container"></div>

        <div class="answer-area">
          <p class="answer-label">THE WORD IS:</p>
          <div id="answerDisplay" class="answer-display"></div>
        </div>

        <div class="buttons">
          <button id="clearBtn" class="action-btn">CLEAR</button>
          <button id="submitBtn" class="action-btn">SUBMIT</button>
        </div>

        <p id="message" class="message"></p>
      </div>
    </section>
  </main>

  <script src="puzzle2.js"></script>
</body>
</html>
